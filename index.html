<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script defer src="JS/script.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>BE HAPPY</title>
</head>
<body>
    <nav>
        <img src="Imagens/mini_logo.png" alt="">
        <ul>
            <li><a href="#inicio">Início</a></li>
            <li><a href="#sobre">Sobre</a></li>
            <li><a href="#produtos">produtos</a></li>
            <li><a href="#contato">Contato</a></li>

        </ul>
    </nav>
    <!------------------ SEÇÃO DE INICIO ------------------>
    <section id="inicio">
        <img src="Imagens/logo.png" alt="foto da logo">
    </section>

    <!------------------ SEÇÃO SOBRE NÓS ------------------>
    <section id="sobre"></section>

    <!------------------ SEÇÃO DOS PRODUTOS ------------------>
    <section id="produtos">
        <h1>Nossos Produtos</h1>
        <div id="cards">


        </div>

    </section>

    <!------------------ SEÇÃO DE CONTATO ------------------>
    <section id="contato">
        <form action="" method="get">
            <label for="nome">Nome do Dono</label>
            <input id="nome" type="text">
            <label for="telefone">Telefone</label>
            <input id="telefone" type="number" name="" id="">
            <label for="nome-pet">Nome do PET</label>
            <input id="nome-pet" type="text">
            <label for="idade-pet">Idade do PET</label>
            <input id="idade-pet" type="number" name="">
            <div>
                <input type="checkbox" name="" id="check">
                <label for="check">Tem restrições alimenticias?</label>
            </div>
            <label for="comportamento">Comportamento do PET</label>
            <textarea name="" id="comportamento"></textarea>

            <button type="button">ENVIAR</button>
        </form>
    </section>
</body>
</html>
