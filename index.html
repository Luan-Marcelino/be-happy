<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script defer src="JS/script.js"></script>
    <link rel="shortcut icon" href="Imagens/mini_logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>BE HAPPY</title>
</head>
<body>
    <nav>
        <img src="Imagens/mini_logo.png" alt="">
        <ul>
            <li><a href="#inicio">Início</a></li>
            <li><a href="#sobre">Sobre</a></li>
            <li><a href="#planos">Planos</a></li>
            <li><a href="#contato">Contato</a></li>

        </ul>
    </nav>
    <!------------------ SEÇÃO DE INICIO ------------------>
    <section id="inicio">
        <img src="Imagens/logo.png" alt="foto da logo">
    </section>

    <!------------------ SEÇÃO SOBRE NÓS ------------------>
    <section id="sobre">
        <h1><span>Sobre</span> Nós</h1>

    </section>

    <!------------------ SEÇÃO DOS planos ------------------>
    <section id="planos">
        <h1><span>Nossos</span> Planos</h1>
        <div id="cards">


        </div>

    </section>

    <!------------------ SEÇÃO DE CONTATO ------------------>
    <section id="contato">
        <h1><span>Fale</span> Conosco</h1>
        <form action="" method="get">
            <label for="nome">Nome do Dono</label>
            <input id="nome" type="text">
            <label for="telefone">Telefone</label>
            <input id="telefone" type="number" name="" id="">
            <label for="nome-pet">Nome do PET</label>
            <input id="nome-pet" type="text">

            <div class="raca-idade">
                <div class="raca">
                    <label for="">Raça</label>
                    <select name="racas" id="">
                        <option value="cao">Seleciona a raça</option>
                        <option value="cao">Cachorro</option>
                        <option value="gato">Gato</option>
                    </select>
                </div>
                <div class="idade">
                    <label class="idade-pet-label" for="idade-pet">Idade do PET</label>
                    <input id="idade-pet" type="number" name="">
                </div>
            </div>

            <div class="sexo">
                <span>SEXO</span>
                <div>
                    <input type="radio" name="sexo" id="macho" value="Macho">
                    <label for="macho">Macho</label>
                                        
                    <input type="radio" name="sexo" id="femea" value="Fêmea">
                    <label for="femea">Fêmea</label>
                </div>
            </div>
            <div>
                <input type="checkbox" name="" id="check">
                <label for="check">Tem restrições alimenticias?</label>
            </div>
            <label for="comportamento">Comportamento do PET</label>
            <textarea name="" id="comportamento"></textarea>

            <button type="button">ENVIAR</button>
        </form>
    </section>
</body>
</html>
